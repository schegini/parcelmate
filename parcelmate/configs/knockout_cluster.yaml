# Base config for running the Project 3 knockout controls on the SC cluster.
# `python -m parcelmate.bin.main` (default steps = all) runs the whole pipeline
# through `subnetwork_knockout`, so a job built from this config produces the
# knockout loss summary + plots with no extra flags.
#
# NOTE ON COST: the knockout step re-runs connectivity + loss once per condition,
# and there is one condition per (network) plus (1 + n_baseline) per network plus
# the union. Keep `networks` short and `n_baseline` small while iterating, and
# expand once you know the run fits your time/GPU budget.
output_dir: /nlp/scr/schegini/parcelmate/knockout

connectivity:
  model_name: gpt2
  # tldr17 == Reddit; random/whitespace are controls. Trim or extend as needed.
  domains: [wikitext, tldr17, codeparrot, random]
  seq_len: 512
  n_samples: 2
  n_tokens: 50000
  batch_size: 8

parcellation:
  n_networks: 50
  n_samples: 10
  connectivity_pca_components: 200

subnetwork_extraction: {}

knockout:
  knockout_mode: mean      # 'mean' = mean-out; 'zero' = zero-out
  n_baseline: 3
  baseline_seed: 0
  networks: [0, 1, 2]      # restrict to the first 3 shared subnetworks; null = all
  include_union: true
  include_healthy: true
  eval_loss: true
  loss_n_tokens: 50000
  steps: []                # per-condition stability plots off (loss plot always runs)
