# Iteration 3 base config: does Project-3 selectivity survive on bigger models?
# Same knockout settings as the gpt2 iteration-1 run (mean-out, thresh 0.5,
# networks [0,1,2], 3 baselines) so results are comparable across model sizes.
# The sweep grids connectivity.model_name over gpt2-medium / gpt2-large.
# batch_size reduced for the larger activations.
output_dir: /nlp/scr/schegini/parcelmate/knockout_scale

connectivity:
  model_name: gpt2-medium   # overridden by grid
  domains: [wikitext, tldr17, codeparrot, random]
  seq_len: 512
  n_samples: 2
  n_tokens: 50000
  batch_size: 4

parcellation:
  n_networks: 50
  n_samples: 10
  connectivity_pca_components: 200

subnetwork_extraction: {}

knockout:
  knockout_mode: mean
  knockout_thresh: 0.5
  n_baseline: 3
  baseline_seed: 0
  networks: [0, 1, 2]
  include_union: true
  include_healthy: true
  eval_loss: true
  loss_n_tokens: 50000
  steps: []
